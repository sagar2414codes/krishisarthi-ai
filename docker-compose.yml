version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishisarthi-backend
    ports:
      - "7860:7860"
    env_file:
      - ./backend/.env
    volumes:
      # Model files must be present locally before running docker-compose.
      # See the "Backend fails to start – missing models" section in DEPLOYMENT.md.
      - ./backend/models:/code/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krishisarthi-frontend
    ports:
      - "3000:80"
    env_file:
      - ./frontend/.env
    environment:
      - BACKEND_URL=http://backend:7860
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
