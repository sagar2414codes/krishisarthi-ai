name: CI — Lint & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (verify production build succeeds)
        env:
          VITE_API_BASE_URL: https://example-backend.up.railway.app
        run: npm run build

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint (flake8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        # E501 — line too long; W503 — line break before binary operator (common in ML code)
        run: flake8 . --max-line-length=120 --extend-ignore=E501,W503 --exclude=__pycache__,notebooks
