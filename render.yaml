services:
  - type: web
    name: krishisarthi-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: PYTHON_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: krishisarthi-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: krishisarthi-backend
          type: web
          property: host
    healthCheckPath: /health
    autoDeploy: true
